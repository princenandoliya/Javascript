<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>

    <form id="form">
        <h2>Enter City Name :</h2><br>
        <input type="text" id="inp" placeholder="Enter City Name" required>
        <button><i class="fa-solid fa-magnifying-glass"></i></button>


        <div id="container">
            <img src="" id="img" alt="">
            <div class="temp">
                <h1 id="temperature"></h1>
                <h2 id="city"></h2>
            </div>
        </div>

        <div class="box">
            <div class="row">
                <div class="col">
                    <img src="" id="humidity-img" alt="">
                    <p id="humidity-name"></p>
                    <p id="humidity"></p>
                </div>


                <div class="col">
                    <img src="" id="speed-img" alt="">
                    <p id="speed-name"></p>
                    <p id="speed"></p>

                </div>
            </div>

        </div>

        <div id="not-found"></div>
    </form>
    <script src="index.js"></script>
</body>

</html>
