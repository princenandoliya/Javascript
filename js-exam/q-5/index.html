<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <form id="form">
        <h1>user registration form</h1><br><br>
        <label for="name">Enter Name :- </label>
        <input type="text" id="name" placeholder="Enter your Name"><br><br>

        <label for="email">Enter Email :-</label>
        <input type="text" id="email" placeholder="Enter your Email"><br><br>

        <label for="password">Enter password :-</label>
        <input type="text" id="password" placeholder="Enter your password"><br><br>

        <label for="age">Enter age :-</label>
        <input type="text" id="age" placeholder="Enter your age"><br><br>

        <label for="mo-number">Enter mobile numner</label>
        <input type="number" id="number" placeholder="Enter your mobile numner"><br><br>

        <button type="submit" id="btn">Registration</button><br><br>

        <p id="result"></p>
    </form>
    <script src="index.js"></script>
</body>
</html>
