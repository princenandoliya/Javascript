<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link rel="stylesheet" href="styel.css">
</head>

<body>


    <form action="" id="form">

        <h2>Temperature Converter</h2>

        <br>
        <input type="number" id="temp" required>

        <br>
        <br>

        <select name="" id="type">
            <option value="cTOf">cTOf</option>
            <option value="fTOc">fTOc</option>
        </select>

        <br>
        <br>

        <button type="submit" id="btn">convert</button>



        <p id="result"></p>
    </form>


    <script src="index.js"></script>
</body>

</html>
